<body>
    <script>
        let sec = parseFloat(prompt("Введіть кількість секунд, що пройшла від початку доби"))
        let hrs = sec / 3600
        let min = sec / 60

        document.write(`Від початку доби пройшло ${hrs}год. або ${min}хв.`)
    </script>
