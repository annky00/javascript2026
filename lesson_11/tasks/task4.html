<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 4</title>
</head>

<body>
    <!-- ! Задача 4. У місті є К шкіл по 11 класів у кожній. Відомі величини зросту учнів. Знайти найвищого учня -->
    <script>
        const getRandomHeight = (elCount, min, max) => Array.from({ length: elCount }, () => min + Math.floor(Math.random() * (max - min + 1)))

        const getRandomPupils = (min, max) => min + Math.floor(Math.random() * (max - min + 1))

        const getRandomClasses = (classesNum, min, max) => Array.from({ length: classesNum }, () => getRandomHeight(getRandomPupils(15, 30), min, max))

        const getRandomSchools = (schoolsNum, classesNum, min, max) => Array.from({ length: schoolsNum }, () => getRandomClasses(classesNum, min, max))

        const schools = parseInt(prompt("Enter the schools number", "3"))


        const schoolsTable = getRandomSchools(schools, 11, 162, 198)

        console.log(schoolsTable);
        document.write("<h1>Pupils table: <br></h1>")
        for (const school of schoolsTable) {
            document.write(`<h1>${school.join("<br>")}</h1>`)
        }

        let higher = -Infinity

        for (const schoolNum of schoolsTable) {
            for (const classNum of schoolNum) {
                for (const pupil of classNum) pupil > higher ? higher = pupil : higher
            }

        }

        document.write(`<h1>The highest pupil: ${higher}</h1>`)


    </script>
    <a href="../index.html">back</a>
</body>

</html>
