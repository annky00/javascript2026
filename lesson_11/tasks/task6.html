<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 6</title>
</head>

<body>
    <!-- ! Задача 6. Дано покази температур за К тижнів. Сформувати список, що містить тільки додатні покази. -->
    <script>
        const getRandomTemp = (elCount, min, max) => Array.from({ length: elCount }, () => min + Math.floor(Math.random() * (max - min + 1)))

        const getRandomMatrix = (weeksNum, min, max) => Array.from({ length: weeksNum }, () => getRandomTemp(7, min, max))

        const weeks = parseInt(prompt("Enter the weeks number", "5"))

        const tempTable = getRandomMatrix(weeks, -10, 28)

        document.write(`<h1>Temperature table: <br> ${tempTable.join("<br>")}</h1>`)


        let plusTempList = tempTable.flat().filter((temp) => temp > 0)

        document.write(`<h1>Plus temperature list: <br> ${plusTempList.join(", ")}</h1>`)
    </script>
    <a href="../index.html">back</a>
</body>

</html>
