<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 2</title>
</head>

<body>
    <!-- ! Задача 2. Дано кількість відвідувачів кафе протягом року (для кожного місяця за кожен заокруглений тиждень - 4) Визначити: -->
    <script>

        const getRandomMonth = (elCount, min, max) => Array.from({ length: elCount }, () => min + Math.floor(Math.random() * (max - min + 1)))
        const getRandomMatrix = (monthCount, weekCount, min, max) => Array.from({ length: monthCount }, () => getRandomMonth(weekCount, min, max))

        const minVal = parseInt(prompt("Enter the min value", "1550"))
        const maxVal = parseInt(prompt("Enter the max value", "6845"))

        const visitors = getRandomMatrix(12, 4, minVal, maxVal)

        document.write(`<h1>Visitors table: <br> ${visitors.join("<br>")}</h1>`)

        //  1) загальну кількість відвідувачів

        let totalVisitors = 0

        for (const month of visitors) {
            for (const week of month) {
                totalVisitors += week
            }
        }

        document.write(`<h1>Total visitors: ${totalVisitors}</h1>`)

        // 2) кількість відвідувачів за літо;

        let summerVisitors = 0

        for (let month = 5; month < 8; month++) {
            for (let week = 0; week < visitors[month].length; week++) {
                summerVisitors += visitors[month][week]
            }
        }

        document.write(`<h1>Summer visitors: ${summerVisitors}</h1>`)

        // 3)кількість відвідувачів за літо з непарними індексами тижнів

        let oddVisitors = 0

        for (let month = 5; month < 8; month++) {
            for (let week = 0; week < visitors[month].length; week += 2) {
                oddVisitors += visitors[month][week]
            }

        }

        document.write(`<h1>Odd summer visitors: ${oddVisitors}</h1>`)


        // 4) кількість відвідувачів за друге півріччя

        let secondHalfVisitors = 0

        for (let month = 6; month < visitors.length; month++) {
            for (let week = 0; week < visitors[month].length; week++) {
                secondHalfVisitors += visitors[month][week]
            }

        }

        document.write(`<h1>Visitors for the second half of the year: ${secondHalfVisitors}</h1>`)
    </script>
    <a href="../index.html">back</a>
</body>

</html>
