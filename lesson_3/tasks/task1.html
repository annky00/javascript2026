<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 1</title>
</head>

<body>
    <!-- ! Задача 1. З клавіатури вводяться імена двох дітей та кількість у них
    ! цукерок. Вивести на екран ім'я тієї дитини, у якої кількість цукерок є більшою, або вивести,
    ! що кількість однакова. -->
    <script>
        const name1 = prompt(`Введіть ім'я першої дитини`, `Іван`)
        const qty1 = parseInt(prompt(`Введіть кількість цукерок у першої дитини`, `5`))
        const name2 = prompt(`Введіть ім'я другої дитини`, `Саша`)
        const qty2 = parseInt(prompt(`Введіть кількість цукерок у другої дитини`, `10`))

        if (qty1 < qty2)
            document.write(`Цукерок більше у ${name2}`)
        else if (qty1 > qty2)
            document.write(`Цукерок більше у ${name1}`)
        else document.write(`У обох однакова кількість цукерок`)
    </script>
    <a href="../index.html">back</a>
</body>

</html>
