<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 3</title>
</head>

<body>
    <!-- ! Задача 3. Випадковим чином генерується число від 1 до 5. Спробуйте вгадати число за 2 спроби. -->
    <script>
        let number = Math.floor(Math.random() * 5) + 1
        const attempt1 = parseInt(prompt(`Перша спроба`))

        if (number === attempt1)
            document.write(`Ви вгадали з першої спроби! Це число - ${number}`)
        else if (number !== attempt1) {
            const attempt2 = parseInt(prompt(`Друга спроба`))
            if (number === attempt2)
                document.write(`Ви вгадали з другої спроби! Це число - ${number}`)
            else document.write(`Ви не вгадали. Це число - ${number}`)
        }
    </script>
    <a href="../index.html">back</a>
</body>

</html>
