<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 2</title>
</head>

<body>
    <!-- ! Задача 2. Вивести на екран номери місяців весни і літа (від 3 до 8). -->
    <script>
        for (let i = 3; i <= 8; i++) {
            if (i <= 5)
                document.write(`Весна: ${i}<br>`)
            else document.write(`Літо: ${i}<br>`)
        }
    </script>
    <a href="../index.html">back</a>
</body>

</html>
