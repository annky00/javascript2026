<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 1</title>
</head>

<body>
    <!-- ! Задача 1. Створити функцію, яка за номером місяця повертає його назву. -->
    <script>
        function getMonthName(month) {
            month = parseInt(prompt("Enter the month number", "12"))
            switch (month) {
                case 1: return "January"
                    break;
                case 2: return "February"
                    break;
                case 3: return "March"
                    break;
                case 4: return "April"
                    break;
                case 5: return "May"
                    break;
                case 6: return "June"
                    break;
                case 7: return "July"
                    break;
                case 8: return "August"
                    break;
                case 9: return "September"
                    break;
                case 10: return "October"
                    break;
                case 11: return "November"
                    break;
                case 12: return "December"
                    break;
                default: return "Incorrect month number"
                    break;
            }
        }

        document.write(`<h1>Month name: ${getMonthName()}</h1>`)
    </script>
    <a href="../index.html">back</a>
</body>

</html>
