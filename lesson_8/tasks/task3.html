<body>
    <!-- ! Задача 3. Дано масив імен учнів. З’ясувати скільки разів зустрічається ім’я «Іван». -->
    <script>
        let pupils = ["Ivan", "Oksana", "Marina", "Olga", "Petro", "Ivan", "Maksym", "Ivan", "Maksym"]

        function howManySimilar(array) {
            let counter = 0
            for (let i = 0; i < array.length; i++) if (array[i] === "Ivan") counter++
            return counter
        }

        document.write(`<h1>Ivaniv: ${howManySimilar(pupils)}</h1>`)


    </script>

</body>
