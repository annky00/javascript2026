<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 2</title>
</head>

<body>
    <!-- ! Задача 2. Дано масив, який зберігає кількість відвідувачів магазину протягом тижня. Вивести на екран: -->
    <!-- !  ●	номери днів, протягом яких кількість відвідувачів була меншою за 20; -->
    <!-- !  ●	номери днів, коли кількість відвідувачів була мінімальною; -->
    <!-- !  ●	номери днів, коли кількість відвідувачів була максимальною; -->
    <!-- !  ●	загальну кількість клієнтів у робочі дні та окремо загальну кількість днів на вихідних.  -->
    <script>
        let visitors = []

        function getVisitorsNum(days, array) {
            for (let i = 0; i < days; i++) array.push(Math.floor(Math.random() * 100) + 1)
            return array
        }

        function whenVisitorsLessThanTwenty(array) {
            let counter = []
            for (let i = 0; i < array.length; i++) {
                if (array[i] < 20) counter.push(i + 1)
            }
            return counter
        }

        function whenVisitorsWasMin(array) {
            let min = Infinity
            let minNum = []
            for (let i = 0; i < array.length; i++) {
                if (array[i] < min) {
                    min = array[i]
                    minNum = [i + 1]
                } else if (array[i] === min) minNum.push(i + 1)
            }
            return minNum
        }

        function whenVisitorsWasMax(array) {
            let max = -Infinity
            let maxNum = []
            for (let i = 0; i < array.length; i++) {
                if (array[i] > max) {
                    max = array[i]
                    maxNum = [i + 1]
                } else if (array[i] === max) maxNum.push(i + 1)
            }
            return maxNum
        }

        function getWorkingTotalVisitors(array) {
            let workingTotalVisitors = 0
            for (let i = 0; i < 5; i++) workingTotalVisitors += array[i]
            return workingTotalVisitors
        }

        function getWeekendTotalVisitors(array) {
            let weekendTotalVisitors = 0
            for (let i = 5; i < 7; i++) weekendTotalVisitors += array[i]
            return weekendTotalVisitors
        }

        document.write(`<h1>Кількість відвідувачів за днями: ${getVisitorsNum(7, visitors)}</h1>`)
        document.write(`<h1>Номери днів, коли кількість відвідувачів була меншою за 20: ${whenVisitorsLessThanTwenty(visitors)}</h1>`)
        document.write(`<h1>Номери днів, коли кількість відвідувачів була мінімальною:${whenVisitorsWasMin(visitors)}</h1>`)
        document.write(`<h1>Номери днів, коли кількість відвідувачів була максимальною${whenVisitorsWasMax(visitors)}</h1>`)
        document.write(`<h1>Загальна кількість відвідувачів в будні дні: ${getWorkingTotalVisitors(visitors)}</h1>`)
        document.write(`<h1>Загальна кількість відвідувачів у вихідні дні: ${getWeekendTotalVisitors(visitors)}</h1>`)


    </script>
    <a href="../index.html">back</a>
</body>

</html>
