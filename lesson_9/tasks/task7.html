<!DOCTYPE html>

<body>
    <!-- ! Задача 7. Дано масив цін. Змінити цей масив так, що на ціни товарів, які більші за 1000 грн. дати 30% знижки. -->
    <script>
        let array = [208, 1112, 865, 987, 250, 2035, 3568, 558, 1000]

        function getDiscount(arr) {
            arr.forEach((element, index, arr) => {
                if (element > 1000) arr[index] = (element * 0.7)
            });
            return arr
        }


        document.write(`<h1>Your numbers: ${getDiscount(array).join(", ")}</h1>`)
    </script>
    <a href="../index.html">back</a>
</body>
