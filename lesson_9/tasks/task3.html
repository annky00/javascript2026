<body>
    <!-- ! Задача 3. Користувач вводить кількість елементів. Створити масив, у якому перші 5 елементів заповнені 1-цями, а інші до кінця масиву заповнені 7-ками. -->
    <script>

        function makeArray(n) {
            let arr = new Array(n)
            arr.fill(1, 0, 5)
            arr.fill(7, 5,)
            return arr
        }

        let number = parseInt(prompt("Enter element's quantity", "8"))
        document.write(`<h1>Your array: ${makeArray(number).join(", ")}</h1>`)


    </script>
    <a href="../index.html">back</a>
</body>

</html>
