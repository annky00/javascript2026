<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 2</title>
</head>

<body>
    <!-- ! Задача 2. Користувач вводить кількість елементів. Створити масив, у якому перша половина заповнена 1-цями, а друга заповнена 7-ками.  -->
    <script>

        function makeArray(n) {
            let arr = new Array(n)
            arr.fill(1, 0, arr.length / 2)
            arr.fill(7, arr.length / 2,)
            return arr
        }

        let number = parseInt(prompt("Enter element's quantity", "6"))
        document.write(`<h1>Your array: ${makeArray(number).join(", ")}</h1>`)

    </script>
    <a href="../index.html">back</a>
</body>

</html>
