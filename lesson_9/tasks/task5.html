<body>
    <!-- ! Задача 5. Дано масив елементів. Знайти добуток додатних елементів -->
    <script>

        let array = [-100, 11, 8, -9, 25, -20, 35, 5, 0]
        function getProduct(arr) {
            let product = 1
            for (let i of arr) {
                if (i > 0) product *= i
            }
            return product
        }

        document.write(`<h1>Your product: ${getProduct(array)}</h1>`)

    </script>

</body>
