<body>
    <!-- ! Задача 6. Дано масив елементів. Усі елементи, які більші за перший елемент помножити на 2-->
    <script>
        let array = [20, 11, 8, -9, 25, -20, 35, 5, 0]

        function getProduct(arr) {
            let product = []
            arr.forEach(element => {
                if (element > arr[0]) product.push(element * 2)
            });
            return product
        }

        document.write(`<h1>Your numbers: ${getProduct(array).join(", ")}</h1>`)
    </script>

</body>
